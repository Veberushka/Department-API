services:
  app:
    build: .
    container_name: Fast_API_dep_empl
    env_file:
      - .env.container
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 32M 
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17.4
    container_name: postgres__dep_empl
    environment:
      POSTGRES_USER: amin
      POSTGRES_PASSWORD: its_my_password
      POSTGRES_DB: postgres__dep_empl
      PGDATA: /var/lib/postgresql/data/data_dep_empl
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/data_dep_empl
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U amin -d postgres__dep_empl" ]
      interval: 50s
      timeout: 30s
      retries: 5
    restart: unless-stopped
  
  postgres_test:
    image: postgres:17.4
    container_name: postgres__test
    environment:
      POSTGRES_USER: amin
      POSTGRES_PASSWORD: its_my_password
      POSTGRES_DB: test_db
      PGDATA: /var/lib/postgresql/data/data_test
    ports:
      - "5434:5432" 
    volumes:
      - pgdata_test:/var/lib/postgresql/data/data_test
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  pgdata_test:
    driver: local